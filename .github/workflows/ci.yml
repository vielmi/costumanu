name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Build + Lint ────────────────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependencies installieren
        run: npm ci

      - name: TypeScript & ESLint
        run: npm run lint

      - name: Next.js Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ─── 2. Unit Tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependencies installieren
        run: npm ci

      - name: Unit Tests ausführen
        run: npm run test

  # ─── 3. E2E Tests ───────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build  # Erst bauen, dann E2E
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependencies installieren
        run: npm ci

      - name: Playwright Browser installieren
        run: npx playwright install --with-deps chromium

      - name: E2E Tests ausführen
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Platform Admin
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          # Rückwärtskompatibel
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          # Stadttheater Zürich
          TEST_OWNER_A_EMAIL: ${{ secrets.TEST_OWNER_A_EMAIL }}
          TEST_OWNER_A_PASSWORD: ${{ secrets.TEST_OWNER_A_PASSWORD }}
          TEST_MEMBER_A_EMAIL: ${{ secrets.TEST_MEMBER_A_EMAIL }}
          TEST_MEMBER_A_PASSWORD: ${{ secrets.TEST_MEMBER_A_PASSWORD }}
          TEST_VIEWER_A_EMAIL: ${{ secrets.TEST_VIEWER_A_EMAIL }}
          TEST_VIEWER_A_PASSWORD: ${{ secrets.TEST_VIEWER_A_PASSWORD }}
          # Stadttheater Bern
          TEST_OWNER_B_EMAIL: ${{ secrets.TEST_OWNER_B_EMAIL }}
          TEST_OWNER_B_PASSWORD: ${{ secrets.TEST_OWNER_B_PASSWORD }}
          TEST_MEMBER_B_EMAIL: ${{ secrets.TEST_MEMBER_B_EMAIL }}
          TEST_MEMBER_B_PASSWORD: ${{ secrets.TEST_MEMBER_B_PASSWORD }}
          TEST_VIEWER_B_EMAIL: ${{ secrets.TEST_VIEWER_B_EMAIL }}
          TEST_VIEWER_B_PASSWORD: ${{ secrets.TEST_VIEWER_B_PASSWORD }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Playwright Report hochladen (bei Fehler)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
